default: &default
  pipelines: "*"
  logger:
    level: 1
    source: default
  job_worker:
    count: 5
    max_retry: 3
    polling_timeout: 1
    shutdown_timeout: 20
  pipeline_advancer:
    count: 3
    max_crash: 10
    max_retry: 3
    polling_timeout: 1
    shutdown_timeout: 20
    steps:
      max_depth: -1
  supervisor:
    polling_timeout: 1
    reaper_timeout: 300
    shutdown_timeout: 30

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
